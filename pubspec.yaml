name: rim_elementary
description: "Rick and Morty explorer built on Elementary (MVVM)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Architecture — Elementary (MVVM)
  elementary: ^3.2.1
  elementary_helper: ^1.1.0

  # DI
  get_it: ^9.2.0
  injectable: ^2.4.4

  # Navigation
  auto_route: ^11.1.0

  # Network
  dio: ^5.8.0+1
  retrofit: ^4.4.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Product packages
  cached_network_image: ^3.4.1
  flutter_drawer_menu: ^0.1.5
  pinch_to_zoom_scrollable: ^0.1.0

  # Localization
  intl: ^0.20.2

  # Branding
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Architecture — testing
  elementary_test: ^2.1.1

  # Codegen
  build_runner: ^2.7.1
  injectable_generator: ^2.6.2
  auto_route_generator: ^10.1.0
  retrofit_generator: ^10.2.7
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  flutter_gen_runner: ^5.6.0
  flutter_launcher_icons: ^0.14.4

  # Linting
  mjk_lint_rules: ^4.0.4

  # Testing
  mocktail: ^1.0.5
  golden_toolkit: ^0.15.0
  sqflite_common_ffi: ^2.3.6

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/branding/

  fonts:
    - family: Nunito
      fonts:
        - asset: fonts/nunito/Nunito-ExtraLight.ttf
          weight: 100
        - asset: fonts/nunito/Nunito-ExtraLight.ttf
          weight: 200
        - asset: fonts/nunito/Nunito-Light.ttf
          weight: 300
        - asset: fonts/nunito/Nunito-Regular.ttf
          weight: 400
        - asset: fonts/nunito/Nunito-Medium.ttf
          weight: 500
        - asset: fonts/nunito/Nunito-SemiBold.ttf
          weight: 600
        - asset: fonts/nunito/Nunito-Bold.ttf
          weight: 700
        - asset: fonts/nunito/Nunito-ExtraBold.ttf
          weight: 800
        - asset: fonts/nunito/Nunito-Black.ttf
          weight: 900

flutter_gen:
  output: lib/gen/
  line_length: 80
